<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deva Master System V13.0 - Gaming Core</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-nav">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h3 id="nav-title" style="cursor:pointer;" onclick="resetFilters()">DEVA SYSTEM</h3>
        <div class="profile-circle-nav" onclick="changeCategory('Personal Interests')">👤</div>
    </div>

    <div id="taskTrackerArea">
        <div class="task-tabs">
            <button class="tab-btn active" id="tabDailyBtn" onclick="switchTaskTab('daily')">Daily Tasks</button>
            <button class="tab-btn" id="tabSpecialBtn" onclick="switchTaskTab('special')">Special Tasks</button>
        </div>
        <div class="down-sheets-container" id="downSheetsArea"></div>
    </div>

    <div class="initialise-btn-area" id="initialiseBtnArea">
        <button class="initialise-btn" onclick="openTrainingForm()">INITIALISE +</button>
    </div>

    <div class="jv-banner">
        <h1 id="bannerTitle" onclick="resetFilters()">HOME COLLECTION</h1>
        <span class="count-badge" id="mainCount">0 Items</span>
    </div>

    <div class="control-bar" id="controlBar">
        <div class="filters-left" style="display:flex; gap:6px;">
            <select class="ctrl-select" id="statusFilter" onchange="render()">
                <option value="ALL">All Status</option>
                <option value="PENDING">Pending</option>
                <option value="COMPLETED">Done</option>
            </select>
            <select class="ctrl-select" id="ratingFilter" onchange="render()">
                <option value="ALL">All Stars</option>
                <option value="⭐⭐⭐⭐⭐">5 Stars</option>
            </select>
        </div>
        <div class="sort-right">
            <select class="ctrl-select" id="sortOrder" onchange="render()">
                <option value="NEWEST">Newest</option>
                <option value="OLDEST">Oldest</option>
            </select>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="sidebar" id="sidebar">
        <h2 style="color:#ff3e3e; margin-bottom:15px; text-align: center; letter-spacing: 1px;">DATABASE</h2>
        <input type="text" id="mainSearch" style="width:100%; padding:12px; margin-bottom:15px; background:#222; color:white; border:1px solid #444; border-radius:8px; box-sizing:border-box;" placeholder="Search..." onkeyup="render()">
        <div id="sidebarSections"></div>
    </div>

    <div class="popup-form" id="popupForm">
        <h3>Create Entry</h3>
        <input type="text" id="vCode" placeholder="Code / Name">
        <input type="file" id="vImageFile" accept="image/*">
        <select id="vManualCategory" class="gold-border-select"></select>
        <input type="text" id="vStudio" placeholder="Studio">
        <input type="text" id="vTopic" placeholder="Topic">
        <input type="text" id="vTags" placeholder="Tags">
        <input type="text" id="vUrl" placeholder="URL">
        
        <select id="vStatus">
            <option value="PENDING">Pending</option>
            <option value="COMPLETED">Completed</option>
        </select>
        
        <select id="vRating">
            <option value="5 Stars">5 Stars</option>
            <option value="4 Stars">4 Stars</option>
            <option value="3 Stars">3 Stars</option>
        </select>
        
        <button id="saveDataBtn" onclick="saveData()" style="width:100%; padding:15px; background:#ff3e3e; color:white; border:none; border-radius:10px; font-weight:bold; text-transform:uppercase; cursor:pointer;">SAVE DATA</button>
    </div>

    <div class="popup-form" id="trainingPopupForm">
        <h3 style="color:#ffd700">INITIALISE NEW EXERCISE</h3>
        <input type="text" id="tExerciseName" placeholder="Exercise Name?">
        <input type="text" id="tBodyPart" placeholder="Which Body Part?">
        <input type="text" id="tDuration" placeholder="Duration?">
        <button onclick="saveTrainingTemplate()" style="width:100%; padding:15px; background:#ffd700; color:black; border:none; border-radius:10px; font-weight:bold;">INITIALISE DATA</button>
    </div>

    <div id="gamingZoneArea" class="gaming-zone-container" style="display: none; width: 92%; margin: 0 auto; position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); box-sizing: border-box; z-index: 1000;">
        <div class="gaming-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 12px; width: 100%;">
            <button class="game-sub-btn" style="background: #141414; border: 2px solid #FF3B30; padding: 14px 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffffff; border-radius: 6px; cursor: pointer; text-align: center; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(255, 59, 48, 0.15);" onclick="filterGaming('Events')">Events</button>
            <button class="game-sub-btn" style="background: #141414; border: 2px solid #FF2D55; padding: 14px 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffffff; border-radius: 6px; cursor: pointer; text-align: center; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(255, 45, 85, 0.15);" onclick="filterGaming('All Attackers List')">All Attackers List</button>
            <button class="game-sub-btn" style="background: #141414; border: 2px solid #4CD964; padding: 14px 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffffff; border-radius: 6px; cursor: pointer; text-align: center; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(76, 217, 100, 0.15);" onclick="filterGaming('My Pokemon')">My Pokemon</button>
            <button class="game-sub-btn" style="background: #141414; border: 2px solid #FF9500; padding: 14px 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffffff; border-radius: 6px; cursor: pointer; text-align: center; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(255, 149, 0, 0.15);" onclick="filterGaming('Reminder')">Reminder</button>
            <button class="game-sub-btn" style="background: #141414; border: 2px solid #007AFF; padding: 14px 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffffff; border-radius: 6px; cursor: pointer; text-align: center; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(0, 122, 255, 0.15);" onclick="filterGaming('Expenses')">Expenses</button>
            <button class="game-sub-btn" style="background: #141414; border: 2px solid #5856D6; padding: 14px 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffffff; border-radius: 6px; cursor: pointer; text-align: center; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(88, 86, 214, 0.15);" onclick="filterGaming('Wanted List')">Wanted List</button>
            <button class="game-sub-btn" style="background: #141414; border: 2px solid #FFCC00; padding: 14px 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffffff; border-radius: 6px; cursor: pointer; text-align: center; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(255, 204, 0, 0.15);" onclick="filterGaming('Priority List')">Priority List</button>
            <button class="game-sub-btn" style="background: #141414; border: 2px solid #0040FF; padding: 14px 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #ffffff; border-radius: 6px; cursor: pointer; text-align: center; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(0, 64, 255, 0.15);" onclick="filterGaming('Settings')">Settings</button>
        </div>
    </div>

    <div id="gamingZoneModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; overflow-y: auto; box-sizing: border-box; padding: 20px;">
        <div style="max-width: 600px; margin: 30px auto; background: #0c0c0c; border: 1px solid #222; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative;">
            <button onclick="closeGamingModal()" style="position: absolute; top: 15px; right: 15px; background: #FF3B30; border: none; color: white; padding: 6px 12px; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 11px; z-index: 10;">Close ✖</button>
            <div id="modalDynamicContent" style="margin-top: 20px; color: #ffffff;"></div>
        </div>
    </div>

    <div id="pokemonEventsArea" style="display: none; padding: 20px; color: white; margin-top: 60px;">
        <button onclick="backToGamingMenu()" style="background: #222; color: #fff; border: 1px solid #444; padding: 10px 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-bottom: 20px;">← BACK TO MENU</button>
        <div id="eventsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px;"></div>
    </div>

    <div class="grid" id="videoGrid"></div>

    <div class="task-type-popup" id="taskTypePopup">
        <h4 style="margin: 0 0 10px 0; color: #fff; font-size: 14px;">Select Target Sheet</h4>
        <button class="popup-opt-btn" onclick="confirmPlacement('daily')">DAILY TASKS</button>
        <button class="popup-opt-btn" onclick="confirmPlacement('special')" style="margin-top:8px;">SPECIAL TASKS</button>
        <button class="popup-opt-btn" onclick="closeAll()" style="margin-top:8px; background:#222; border-color:#444;">CANCEL</button>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
